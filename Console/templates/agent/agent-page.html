<div class="agent-page" name="agentPageRoot">
    <header class="agent-header">
        <h1 class="agent-title">Squidly Assistant</h1>
        <p class="agent-subtitle">Ask questions or tell me what you'd like to do.</p>
    </header>

    <div class="agent-body">
        <div class="agent-messages" name="messages"></div>
        <div class="agent-suggestions" name="suggestions">
            <button type="button" class="agent-suggestion-chip" name="suggestion1">How do I schedule a meeting?</button>
            <button type="button" class="agent-suggestion-chip" name="suggestion2">Open settings</button>
            <button type="button" class="agent-suggestion-chip" name="suggestion3">How do I host a session?</button>
        </div>
    </div>

    <div class="agent-footer">
        <div class="agent-input-wrap">
            <input type="text" name="input" placeholder="Message Squidly Assistant..." autocomplete="off" />
            <button type="button" name="sendBtn" class="agent-send-btn" title="Send">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>
</div>
